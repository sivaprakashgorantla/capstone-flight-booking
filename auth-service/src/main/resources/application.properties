  spring.application.name=auth-service
server.port=8081

# ─── JWT ───────────────────────────────────────────────────────────────────────
# Base64-encoded 256-bit secret (change this in production!)
jwt.secret=dGhpcy1pcy1hLXNlY3VyZS1qd3Qtc2VjcmV0LWtleS0yMDI2LXBvYy1hdXRo
# Token validity: 24 hours in milliseconds
jwt.expiration=86400000

# ─── H2 In-Memory Database ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.auth_service=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{40} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{40} - %msg%n
logging.file.name=logs/auth-service.log

# ─── Springdoc / Swagger ───────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=false

# ─── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ─── Eureka ────────────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ─── Email Service (internal RestTemplate calls via Eureka load balancer) ───────
# @LoadBalanced RestTemplate resolves "EMAIL-SERVICE" → actual host via Eureka
email.service.url=http://EMAIL-SERVICE
internal.service.key=poc-internal-svc-key-2026
