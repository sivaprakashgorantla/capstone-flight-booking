# ─── Application ────────────────────────────────────────────────────────────
spring.application.name=FLIGHT-SERVICE
server.port=8083

# ─── H2 In-Memory Database ───────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:flightdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT (must match auth-service secret exactly) ────────────────────────────
jwt.secret=dGhpcy1pcy1hLXNlY3VyZS1qd3Qtc2VjcmV0LWtleS0yMDI2LXBvYy1hdXRo
jwt.expiration=86400000

# ─── Eureka Service Discovery ─────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ─── Springdoc / Swagger UI ──────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ─── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.flight.flight_service=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
