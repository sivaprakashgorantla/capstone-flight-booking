# ?? Application ??????????????????????????????????????????????????????????????
spring.application.name=NOTIFICATION-SERVICE
server.port=8088

# ?? H2 In-Memory Database ????????????????????????????????????????????????????
spring.datasource.url=jdbc:h2:mem:notificationdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ?? Eureka ???????????????????????????????????????????????????????????????????
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ?? JWT (validation only ? tokens issued by auth-service) ????????????????????
jwt.secret=dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIGZsaWdodCBhcHAgand0IHRva2Vu
jwt.expiration=86400000

# ?? Internal Service Security ????????????????????????????????????????????????
internal.service.key=poc-internal-svc-key-2026

# ?? Actuator ?????????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ?? SpringDoc / Swagger ??????????????????????????????????????????????????????
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# ?? Logging ??????????????????????????????????????????????????????????????????
logging.level.com.flight.notification_service=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
